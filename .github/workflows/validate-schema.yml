name: Validate Agent Cards

on:
  push:
    paths:
      - "examples/**/*.json"
      - "schema/**"
  pull_request:
    paths:
      - "examples/**/*.json"
      - "schema/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install jsonschema
        run: pip install jsonschema

      - name: Validate all agent cards
        run: |
          python - <<'EOF'
          import json
          import glob
          import sys
          from jsonschema import validate, ValidationError

          with open("schema/agent.alp.schema.json") as f:
              schema = json.load(f)

          cards = glob.glob("examples/**/*.json", recursive=True)
          errors = []

          for card_path in cards:
              with open(card_path) as f:
                  card = json.load(f)
              try:
                  validate(instance=card, schema=schema)
                  print(f"  PASS  {card_path}")
              except ValidationError as e:
                  print(f"  FAIL  {card_path}: {e.message}")
                  errors.append(card_path)

          if errors:
              print(f"\n{len(errors)} card(s) failed validation.")
              sys.exit(1)
          else:
              print(f"\nAll {len(cards)} card(s) valid.")
          EOF
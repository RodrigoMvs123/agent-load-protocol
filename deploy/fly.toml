app = "your-alp-agent"          # change to your app name
primary_region = "iad"

[build]
  # Fly auto-detects Python via requirements.txt

[env]
  PORT = "8080"
  AGENT_CARD_PATH = "examples/hello-agent/agent.alp.json"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
